<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>meety · Profilo</title>

  <link rel="stylesheet" href="ui.css">
</head>

<body>
  <div class="page">
    <div class="top">
      <img src="logo.png" class="logo-mini" alt="meety" onclick="goHome()">
      <div class="step-pill">4/4</div>
    </div>

    <div class="card">
      <div class="section">
        <div class="label">Qualcosa su di te...</div>
      </div>

      <div class="section">
        <div class="label">Segno zodiacale<span class="req">*</span></div>
        <select id="zodiac">
          <option value="">Seleziona il tuo segno</option>
          <option>♈ Ariete</option>
          <option>♉ Toro</option>
          <option>♊ Gemelli</option>
          <option>♋ Cancro</option>
          <option>♌ Leone</option>
          <option>♍ Vergine</option>
          <option>♎ Bilancia</option>
          <option>♏ Scorpione</option>
          <option>♐ Sagittario</option>
          <option>♑ Capricorno</option>
          <option>♒ Acquario</option>
          <option>♓ Pesci</option>
        </select>
      </div>

      <div class="section">
        <div class="label">Cosa bevi di solito?<span class="req">*</span></div>
        <select id="drink">
          <option value="">Seleziona</option>
          <option>Spritz / Aperitivo</option>
          <option>Gin Tonic</option>
          <option>Birra</option>
          <option>Vino</option>
          <option>Cocktail dolce</option>
          <option>Cocktail amaro</option>
          <option>Analcolico</option>
          <option>Bevo qualsiasi cosa</option>
          <option>Totalmente astemio/a</option>
        </select>
      </div>

      <div class="section">
        <div class="label">Che musica ascolti?<span class="req">*</span></div>
        <select id="music">
          <option value="">Seleziona</option>
          <option>Pop</option>
          <option>Rap / Trap</option>
          <option>House</option>
          <option>Techno / EDM</option>
          <option>Reggaeton</option>
          <option>Rock</option>
          <option>Indie</option>
          <option>Un po' di tutto</option>
        </select>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="back()">Indietro</button>
        <button class="btn btn-primary" id="finishBtn" onclick="finish()">Finisci</button>
      </div>
    </div>

    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div>
    </div>
  </div>

<script>
  const API_BASE = "https://matchme-production-73a8.up.railway.app";

  const dir = sessionStorage.getItem("nav_dir");
  if(dir === "prev") document.documentElement.style.setProperty("--anim","inLeft");
  if(dir === "next") document.documentElement.style.setProperty("--anim","inRight");
  sessionStorage.removeItem("nav_dir");

  if(!localStorage.getItem("status") || !localStorage.getItem("purpose")) location.href="step3.html";

  const restore = (id, key) => {
    const v = localStorage.getItem(key);
    if(v) document.getElementById(id).value = v;
  };
  restore("zodiac","zodiac");
  restore("drink","drink");
  restore("music","music");

  // ✅ HOME “VERA”: evita rimbalzi su index
  function goHome(){
    sessionStorage.setItem("force_home", "1");
    location.href = "index.html";
  }

  function back(){
    localStorage.setItem("profile_step","3");
    sessionStorage.setItem("nav_dir","prev");
    location.href="step3.html";
  }

  function buildPayload(zodiac, drink, music){
    return {
      event_id: (localStorage.getItem("event_id") || "").trim(),
      name: (localStorage.getItem("name") || "").trim(),
      table: (localStorage.getItem("table") || "").trim(),
      gender_me: (localStorage.getItem("gender_me") || "").trim(),
      gender_seek: (localStorage.getItem("gender_seek") || "").trim(),
      status: (localStorage.getItem("status") || "").trim(),
      purpose: (localStorage.getItem("purpose") || "").trim(),
      zodiac: zodiac,
      drink: drink,
      music: music
    };
  }

  async function finish(){
    const btn = document.getElementById("finishBtn");
    btn.disabled = true;

    try{
      const zodiac = document.getElementById("zodiac").value;
      const drink  = document.getElementById("drink").value;
      const music  = document.getElementById("music").value;

      if(!zodiac || !drink || !music){
        alert("Completa tutti i campi");
        btn.disabled = false;
        return;
      }

      localStorage.setItem("zodiac", zodiac);
      localStorage.setItem("drink", drink);
      localStorage.setItem("music", music);

      const payload = buildPayload(zodiac, drink, music);

      if(!payload.event_id || !payload.name || !payload.table){
        alert("Dati mancanti. Torna allo Step 1 e rifai il profilo.");
        btn.disabled = false;
        return;
      }

      const existingToken = (localStorage.getItem("session_token") || "").trim();

      // SE HO TOKEN: UPDATE PROFILO
      if(existingToken){
        const res = await fetch(API_BASE + "/api/profile", {
          method: "POST",
          headers: {
            "Content-Type":"application/json",
            "Authorization":"Bearer " + existingToken
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(() => null);

        if(!res.ok || !data || !data.ok){
          alert("Errore update profilo. Riprova.");
          btn.disabled = false;
          return;
        }

        localStorage.setItem("profile_complete","true");
        localStorage.setItem("profile_step","4");
        sessionStorage.setItem("nav_dir","next");
        location.href="hub.html";
        return;
      }

      // ALTRIMENTI: REGISTER
      const res = await fetch(API_BASE + "/api/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload)
      });

      const data = await res.json().catch(() => null);

      if(!res.ok || !data || !data.ok || !data.session_token){
        alert("Errore registrazione server. Riprova.");
        btn.disabled = false;
        return;
      }

      localStorage.setItem("session_token", data.session_token);
      localStorage.setItem("profile_complete","true");
      localStorage.setItem("profile_step","4");

      sessionStorage.setItem("nav_dir","next");
      location.href="hub.html";

    }catch(e){
      alert("Errore connessione. Controlla internet e riprova.");
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
