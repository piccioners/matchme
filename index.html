<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>meety · Entra nella serata</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      height:100svh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#120018;
      color:#fff;
      font-family:system-ui,-apple-system,BlinkMacSystemFont;
    }
    .wrap{
      text-align:center;
      padding:24px;
      max-width:420px;
      width:100%;
    }
    .logo-img{
      width:220px;
      max-width:80%;
      margin-bottom:18px;
    }
    .title{
      font-size:28px;
      font-weight:700;
      margin:0 0 10px 0;
      letter-spacing:.2px;
    }
    .subtitle{
      opacity:.7;
      font-size:16px;
      margin:0 0 36px 0;
      line-height:1.35;
    }
    .btn{
      width:100%;
      padding:18px;
      border-radius:999px;
      font-size:20px;
      font-weight:700;
      cursor:pointer;
      transition:transform .05s ease;
    }
    .btn:active{
      transform:scale(.97);
    }
    .btn-primary{
      border:none;
      background:#ff2f92;
      color:#fff;
      margin-bottom:14px;
    }
    .btn-outline{
      background:transparent;
      border:2px solid #ff2f92;
      color:#ff2f92;
    }
    .tiny{
      margin-top:18px;
      font-size:12px;
      opacity:.45;
    }
  </style>

  <script>
    // ID serata (cambialo SOLO a inizio evento)
    localStorage.setItem("event_id", "GAETA_2026_06_15");

    // Se l'utente è già nel flusso, non deve rivedere "Nuovo utente"
    // (stessa logica che usi negli step)
    const currentStep = localStorage.getItem("step");
    if(currentStep){
      if(currentStep === "results"){
        window.location.href = "results.html";
      } else if(currentStep !== "0"){
        // step "1", "2", "3", ecc.
        window.location.href = "step" + currentStep + ".html";
      }
    }
  </script>
</head>

<body>

  <div class="wrap">
    <img src="logo.png" alt="meety" class="logo-img">

    <h1 class="title">Entra nella serata</h1>
    <p class="subtitle">
      Crea il tuo profilo e scopri con chi combaci di più.
    </p>

    <button class="btn btn-primary" onclick="location.href='step1.html'">
      Nuovo utente
    </button>

    <button class="btn btn-outline" onclick="location.href='come-si-gioca.html'">
      Come funziona
    </button>

    <div class="tiny">
      meety è pensato per essere usato durante l’evento.
    </div>
  </div>

</body>
</html>
