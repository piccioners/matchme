<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>meety · Risultati</title>
  <link rel="stylesheet" href="style.css">

  <style>
    :root{
      --bg1:#120018;--bg2:#0b0012;
      --pink:#ff2f92;--violet:#7c3aed;
      --panel: rgba(27,0,34,.35);
      --stroke: rgba(255,47,146,.35);
      --ink:#fff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100svh;
      overflow-y:auto;
      overflow-x:hidden;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      color:var(--ink);
      font-family:system-ui,-apple-system,BlinkMacSystemFont;
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(124,58,237,.22), transparent 55%),
        radial-gradient(900px 700px at 80% 20%, rgba(255,47,146,.18), transparent 55%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      padding:20px;
    }
    .wrap{
      width:100%;
      max-width:420px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      margin-bottom:14px;
    }
    .logo-mini{
      width:92px;
      max-width:44vw;
      filter: drop-shadow(0 14px 34px rgba(255,47,146,.18));
      cursor:pointer;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:16px;
      backdrop-filter: blur(10px);
      margin-bottom:14px;
    }
    h1{
      margin:0 0 14px 0;
      font-size:22px;
      font-weight:900;
    }
    .section-title{
      margin:0 0 10px 0;
      font-size:17px;
      font-weight:900;
    }

    .search-row{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .search-row input{
      flex:1;
      min-width:0;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(27,0,34,.55);
      color:#fff;
      font-size:15px;
      font-weight:800;
      outline:none;
      -webkit-appearance:none;
      appearance:none;
    }
    .search-row input::placeholder{
      opacity:.45;
      font-weight:750;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .match{
      background: rgba(27,0,34,.35);
      border: 1px solid rgba(255,255,255,.10);
      border-radius:16px;
      padding:14px;
      cursor:pointer;
      transition: transform .08s ease, border-color .15s ease, background .15s ease;
    }
    .match:active{
      transform:scale(.99);
    }
    .match.open{
      border-color: rgba(255,47,146,.45);
      background: rgba(255,47,146,.08);
    }

    .match-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .m-left{
      min-width:0;
      flex:1;
    }
    .m-name{
      font-weight:950;
      font-size:17px;
      margin:0 0 6px 0;
      line-height:1.15;
      letter-spacing:.1px;
    }
    .m-meta{
      opacity:.82;
      font-size:13px;
      font-weight:700;
      margin:0;
      line-height:1.2;
    }

    .m-right{
      text-align:right;
      display:flex;
      flex-direction:column;
      gap:5px;
      align-items:flex-end;
      flex:0 0 auto;
    }

    .pct{
      font-weight:900;
      font-size:14px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,47,146,.35);
      background: rgba(255,47,146,.10);
      white-space:nowrap;
    }

    .arrow{
      font-size:11px;
      opacity:.6;
      line-height:1;
    }

    .match-details{
      display:none;
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .match.open .match-details{
      display:block;
    }

    .details-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px 12px;
    }

    .detail{
      min-width:0;
    }

    .detail-k{
      font-size:10px;
      opacity:.58;
      margin-bottom:3px;
    }

    .detail-v{
      font-size:12px;
      font-weight:800;
      line-height:1.22;
      word-break:break-word;
    }

    .btn{
      width:100%;
      padding:16px;
      border-radius:999px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      margin-top:12px;
    }
    .btn-secondary{
      background: rgba(27,0,34,.35);
      border:1.5px solid rgba(255,47,146,.40);
      color:#fff;
    }

    .btn-inline{
      width:auto;
      margin-top:0;
      padding:14px 16px;
      font-size:14px;
      flex:0 0 auto;
    }

    .bottom-home{
      margin-top:2px;
    }

    .empty{
      text-align:center;
      padding:8px 6px;
    }
    .big{
      font-size:18px;
      font-weight:950;
      margin:0 0 8px 0;
    }
    .sub{
      margin:0;
      opacity:.78;
      font-size:14px;
      line-height:1.35;
    }

    @media (max-width:420px){
      .details-grid{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width:360px){
      .search-row{
        flex-direction:column;
      }
      .btn-inline{
        width:100%;
      }
      .details-grid{
        grid-template-columns:1fr;
      }
      .match-top{
        align-items:flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <img src="logo.png" class="logo-mini" onclick="location.href='hub.html'">
    </div>

    <div class="card">
      <h1>I tuoi match</h1>
      <div id="content"></div>
    </div>

    <div class="card">
      <div class="section-title">Cerca per tavolo</div>
      <div class="search-row">
        <input id="tableSearchInput" placeholder="Es. 12">
        <button class="btn btn-secondary btn-inline" onclick="searchByTable()">Cerca</button>
      </div>
      <div id="tableSearchContent"></div>
    </div>

    <button class="btn btn-secondary bottom-home" onclick="location.href='hub.html'">Torna alla Home serata</button>
  </div>

<script>
  const API_BASE = "https://matchme-production-73a8.up.railway.app";

  if(localStorage.getItem("profile_complete") !== "true"){
    location.href = "step1.html";
  }

  const sessionToken = (localStorage.getItem("session_token") || "").trim();
  if(!sessionToken){
    location.href = "step1.html";
  }

  function readAnswers(){
    const a = [];
    for(let i=1;i<=10;i++){
      const v = parseInt(localStorage.getItem("q"+i) || "0", 10);
      if(!v) return null;
      a.push(v);
    }
    return a;
  }

  const myAnswers = readAnswers();
  if(!myAnswers){
    location.href = "domande.html";
  }

  const mySeek = (localStorage.getItem("gender_seek") || "").trim();
  const myGender = (localStorage.getItem("gender_me") || "").trim();

  let allParticipants = [];

  function compatibility(a, b){
    const n = Math.min(a.length, b.length);
    let sumDiff = 0;
    for(let i=0;i<n;i++) sumDiff += Math.abs(a[i]-b[i]);
    const maxDiff = 4 * n;
    const score = 100 - (sumDiff / maxDiff) * 100;
    return Math.max(0, Math.min(100, score));
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function isCompatibleByGender(mySeekValue, otherGenderMe){
    const seek = (mySeekValue || "").trim();
    const other = (otherGenderMe || "").trim();

    if(seek === "Entrambi"){
      return other === "Uomo" || other === "Donna" || other === "Altro";
    }

    if(seek === "Uomo"){
      return other === "Uomo";
    }

    if(seek === "Donna"){
      return other === "Donna";
    }

    return false;
  }

  function isReciprocal(otherSeek, myGenderValue){
    const seek = (otherSeek || "").trim();
    const me = (myGenderValue || "").trim();

    if(seek === "Entrambi"){
      return me === "Uomo" || me === "Donna" || me === "Altro";
    }

    if(seek === "Uomo"){
      return me === "Uomo";
    }

    if(seek === "Donna"){
      return me === "Donna";
    }

    return false;
  }

  function buildDetail(label, value){
    return `
      <div class="detail">
        <div class="detail-k">${escapeHtml(label)}</div>
        <div class="detail-v">${escapeHtml(value || "—")}</div>
      </div>
    `;
  }

  function createProfileCard(p, pctText){
    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <div class="match-top">
        <div class="m-left">
          <p class="m-name">${escapeHtml(p.name || "Sconosciuto")}</p>
          <p class="m-meta">Tavolo ${escapeHtml(String(p.table || "—"))}</p>
        </div>
        <div class="m-right">
          <div class="pct">${escapeHtml(pctText)}</div>
          <div class="arrow">Tocca per aprire</div>
        </div>
      </div>

      <div class="match-details">
        <div class="details-grid">
          ${buildDetail("Io sono", p.gender_me)}
          ${buildDetail("Cerco", p.gender_seek)}
          ${buildDetail("Stato", p.status)}
          ${buildDetail("Sono qui per", p.purpose)}
          ${buildDetail("Segno", p.zodiac)}
          ${buildDetail("Drink", p.drink)}
          ${buildDetail("Musica", p.music)}
        </div>
      </div>
    `;

    div.addEventListener("click", () => {
      div.classList.toggle("open");
    });

    return div;
  }

  async function load(){
    const content = document.getElementById("content");

    try{
      const res = await fetch(API_BASE + "/api/participants", {
        method: "GET",
        headers: { "Authorization": "Bearer " + sessionToken }
      });

      const data = await res.json().catch(() => null);
      if(!res.ok || !data || !data.ok || !Array.isArray(data.participants)){
        content.innerHTML = `
          <div class="empty">
            <p class="big">Errore caricamento match</p>
            <p class="sub">Riprova tra poco.</p>
          </div>
        `;
        return;
      }

      const participants = data.participants;
      allParticipants = participants;

      const filtered = participants.filter(p => {
        if(!p || !Array.isArray(p.answers)) return false;

        if(!isCompatibleByGender(mySeek, p.gender_me)) return false;
        if(!isReciprocal(p.gender_seek, myGender)) return false;

        return true;
      });

      const ranked = filtered.map(p => ({
        ...p,
        score: compatibility(myAnswers, p.answers)
      })).sort((a,b)=> b.score - a.score).slice(0, 5);

      if(ranked.length === 0){
        content.innerHTML = `
          <div class="empty">
            <p class="big">Nessun match reciproco</p>
            <p class="sub">Per ora non ci sono profili compatibili.</p>
          </div>
        `;
        return;
      }

      const list = document.createElement("div");
      list.className = "list";

      ranked.forEach(p => {
        const pct = (typeof p.score === "number" ? p.score : 0).toFixed(1) + "%";
        list.appendChild(createProfileCard(p, pct));
      });

      content.innerHTML = "";
      content.appendChild(list);

    }catch(e){
      content.innerHTML = `
        <div class="empty">
          <p class="big">Errore connessione</p>
          <p class="sub">Riprova tra poco.</p>
        </div>
      `;
    }
  }

  function searchByTable(){
    const container = document.getElementById("tableSearchContent");
    const input = document.getElementById("tableSearchInput");
    const table = (input.value || "").trim();

    if(!table){
      container.innerHTML = `
        <div class="empty" style="padding-top:14px;">
          <p class="sub">Inserisci un tavolo.</p>
        </div>
      `;
      return;
    }

    const found = allParticipants.filter(p => String(p.table || "").trim() === table);

    if(found.length === 0){
      container.innerHTML = `
        <div class="empty" style="padding-top:14px;">
          <p class="big">Nessuno trovato</p>
          <p class="sub">Nessun profilo per il tavolo ${escapeHtml(table)}.</p>
        </div>
      `;
      return;
    }

    const list = document.createElement("div");
    list.className = "list";

    found.forEach(p => {
      list.appendChild(createProfileCard(p, "Profilo"));
    });

    container.innerHTML = "";
    container.appendChild(list);
  }

  load();
</script>
</body>
</html>
